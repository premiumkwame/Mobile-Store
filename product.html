<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products | Fresh Squeeze</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="logo">OUR<span>SHOP</span></div>
    </nav>

    <section class="carousel-container">
        <h2>Signature Juices</h2>
        <div class="carousel" id="juiceCarousel">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1622597467836-f38a6fe4020a?auto=format&fit=crop&w=300" alt="Pineapple">
                <h3>Golden Pineapple</h3>
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?auto=format&fit=crop&w=300" alt="Watermelon">
                <h3>Fresh Watermelon</h3>
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1613478223719-2ab802602423?auto=format&fit=crop&w=300" alt="Orange">
                <h3>Zesty Orange</h3>
            </div>
        </div>
        <div class="carousel-controls">
            <button onclick="moveCarousel(-1)">Prev</button>
            <button onclick="moveCarousel(1)">Next</button>
        </div>
    </section>

    <section class="pastry-grid">
        <h2>Fresh Pastries</h2>
        <div class="grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=200" alt="Croissant">
                <p>Butter Croissant</p>
                <span>₵ 25.00</span>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=200" alt="Muffin">
                <p>Choco Muffin</p>
                <span>₵ 30.00</span>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
